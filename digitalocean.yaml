# DigitalOcean App Spec (digitalocean.yaml)
# To use this: 
# 1. Go to DigitalOcean App Platform dashboard.
# 2. Create a new App -> "Import from App Spec".
# 3. Paste this content.

name: trajetour
region: fra # Frankfurt (Best for North Africa/Europe)
services:
  - name: server
    environment_slug: node-js
    github:
      repo: zoukhdev/trajetour
      branch: main
      deploy_on_push: true
    source_dir: server
    build_command: npm install && npm run build
    run_command: npm start
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    envs:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: JWT_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: CLOUDINARY_CLOUD_NAME
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: CLOUDINARY_API_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: CLOUDINARY_API_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: CLIENT_URL
        value: https://trajetour.com
      - key: ADMIN_EMAIL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: ADMIN_PASSWORD
        scope: RUN_AND_BUILD_TIME
        type: SECRET

static_sites:
  - name: client
    github:
      repo: zoukhdev/trajetour
      branch: main
      deploy_on_push: true
    source_dir: client
    build_command: npm install --include=dev && npm run build
    output_dir: dist
    catchall_document: index.html
    envs:
      - key: VITE_API_URL
        value: /api

domains:
  - domain: trajetour.com
    type: PRIMARY
    wildcard: true
    zone: trajetour.com
